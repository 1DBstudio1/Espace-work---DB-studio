<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Studio — Accès</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-dim: #8a6f2e;
    --bg: #080808;
    --surface: #111111;
    --border: #1e1e1e;
    --text: #e8e8e8;
    --muted: #555;
    --danger: #c0392b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  input:focus { border-color: var(--gold); }

  .error {
    display: none;
    color: var(--danger);
    font-size: 12px;
    margin-bottom: 16px;
  }

  .btn {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #d9b55c; }
  .btn:active { transform: scale(0.99); }

  .line {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin-bottom: 32px;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>

<div class="card">
  <div class="logo">DB Studio</div>
  <div class="tagline">Espace de travail</div>
  <div class="line"></div>

  <label>Identifiant</label>
  <input type="text" id="user" placeholder="admin" autocomplete="off">

  <label>Mot de passe</label>
  <input type="password" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">

  <div class="error" id="err">Identifiants incorrects.</div>

  <button class="btn" onclick="login()">Accéder →</button>
</div>

<script>
  function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    const err = document.getElementById('err');

    // Credentials temporaires (à remplacer par auth JWT)
    if (u === 'admin' && p === 'dbstudio') {
      sessionStorage.setItem('auth', 'true');
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  }
</script>
</body>
</html>
