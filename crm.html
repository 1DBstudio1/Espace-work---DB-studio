<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Studio — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #C9A84C; --bg: #080808; --surface: #0f0f0f; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #555; --green: #27ae60; --red: #c0392b; --orange: #e67e22; --blue: #2980b9; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; min-height: 100vh; }
  nav { width: 220px; min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 32px 0; position: fixed; top: 0; left: 0; bottom: 0; }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--gold); letter-spacing: 3px; padding: 0 24px; margin-bottom: 40px; }
  .nav-section { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 0 24px; margin-bottom: 8px; margin-top: 20px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 13px; color: var(--muted); text-decoration: none; transition: all 0.15s; border-left: 2px solid transparent; }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(201,168,76,0.05); }
  .nav-item .ico { font-size: 15px; width: 18px; text-align: center; }
  .nav-bottom { margin-top: auto; padding: 0 24px; }
  .nav-logout { font-size: 11px; color: var(--muted); cursor: pointer; text-decoration: none; }
  .nav-logout:hover { color: var(--red); }
  main { margin-left: 220px; flex: 1; padding: 40px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; }
  .btn-gold { padding: 12px 24px; background: var(--gold); border: none; color: #000; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
  .btn-gold:hover { background: #d9b55c; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
  th { text-align: left; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border); }
  td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover td { background: var(--surface); }
  .badge { display: inline-block; padding: 3px 10px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
  .badge.s0,.badge.s1,.badge.s2 { background: rgba(41,128,185,0.15); color: var(--blue); border: 1px solid rgba(41,128,185,0.3); }
  .badge.s3,.badge.s4,.badge.s5 { background: rgba(230,126,34,0.15); color: var(--orange); border: 1px solid rgba(230,126,34,0.3); }
  .badge.s6,.badge.s7 { background: rgba(155,89,182,0.15); color: #9b59b6; border: 1px solid rgba(155,89,182,0.3); }
  .badge.s8,.badge.s9,.badge.s10,.badge.s11,.badge.s12,.badge.s13,.badge.s14,.badge.s15,.badge.s16 { background: rgba(39,174,96,0.15); color: var(--green); border: 1px solid rgba(39,174,96,0.3); }
  .badge.perdu { background: rgba(192,57,43,0.15); color: var(--red); border: 1px solid rgba(192,57,43,0.3); }
  .action-link { font-size: 11px; color: var(--gold); cursor: pointer; margin-right: 12px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: flex-start; justify-content: flex-end; }
  .modal-overlay.open { display: flex; }
  .drawer { background: var(--surface); border-left: 1px solid var(--border); width: 480px; max-width: 95vw; height: 100vh; overflow-y: auto; padding: 40px 32px; }
  .drawer h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 24px; }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 11px 14px; outline: none; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--gold); }
  .form-row select option { background: var(--surface); }
  .form-row textarea { min-height: 80px; resize: vertical; }
  .drawer-btns { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel { padding: 12px 20px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; cursor: pointer; }
  .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 13px; }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">DB STUDIO</div>
  <div class="nav-section">Principal</div>
  <a href="dashboard.html" class="nav-item"><span class="ico">⬛</span> Dashboard</a>
  <a href="crm.html" class="nav-item active"><span class="ico">◈</span> Prospects & Clients</a>
  <a href="projets.html" class="nav-item"><span class="ico">◇</span> Projets</a>
  <div class="nav-section">Gestion</div>
  <a href="finances.html" class="nav-item"><span class="ico">◆</span> Finances</a>
  <a href="documents.html" class="nav-item"><span class="ico">▣</span> Documents</a>
  <div class="nav-section">Marketing</div>
  <a href="reseaux.html" class="nav-item"><span class="ico">◎</span> Réseaux Sociaux</a>
  <a href="marketing.html" class="nav-item"><span class="ico">✦</span> Cerveau Marketing</a>
  <div class="nav-section">Alter Ego</div>
  <a href="alterego.html" class="nav-item"><span class="ico">◉</span> Mon Alter Ego</a>
  <div class="nav-bottom"><a class="nav-logout" onclick="logout()">← Déconnexion</a></div>
</nav>

<main>
  <div class="top-bar">
    <div class="page-title">Prospects & Clients</div>
    <button class="btn-gold" onclick="openDrawer()">+ Nouveau prospect</button>
  </div>
  <div id="loadingMsg" class="loading">Chargement...</div>
  <table id="crmTable" style="display:none">
    <thead><tr><th>Contact</th><th>Entreprise</th><th>Étape</th><th>Tél</th><th>Notes</th><th>Actions</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</main>

<div class="modal-overlay" id="drawer">
  <div class="drawer">
    <h3 id="drawerTitle">Nouveau prospect</h3>
    <div class="form-row"><label>Nom</label><input type="text" id="fNom" placeholder="Jean Dupont"></div>
    <div class="form-row"><label>Entreprise</label><input type="text" id="fEntreprise" placeholder="Commerce / Boite"></div>
    <div class="form-row"><label>Téléphone</label><input type="tel" id="fTel" placeholder="+33 6 ..."></div>
    <div class="form-row"><label>Email</label><input type="email" id="fEmail" placeholder="contact@exemple.com"></div>
    <div class="form-row"><label>Étape</label>
      <select id="fEtape">
        <option value="0">1 — Identification</option><option value="1">2 — Qualification</option>
        <option value="2">3 — Prise de contact</option><option value="3">4 — Rendez-vous</option>
        <option value="4">5 — Maquette</option><option value="5">6 — Proposition</option>
        <option value="6">7 — Relances</option><option value="7">8 — Négociation</option>
        <option value="8">9 — Signé</option><option value="9">10 — Onboarding</option>
        <option value="10">11 — Construction</option><option value="11">12 — Validation client</option>
        <option value="12">13 — Livraison</option><option value="13">14 — Formation client</option>
        <option value="14">15 — Maintenance</option><option value="15">16 — Upsell</option>
        <option value="16">17 — Renouvellement</option>
      </select>
    </div>
    <div class="form-row"><label>Notes</label><textarea id="fNotes" placeholder="Besoins, remarques..."></textarea></div>
    <div class="drawer-btns">
      <button class="btn-cancel" onclick="closeDrawer()">Annuler</button>
      <button class="btn-gold" onclick="saveProspect()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  if (!sessionStorage.getItem('auth')) window.location.href = 'index.html';
  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  const ETAPES = ['Identification','Qualification','Prise de contact','Rendez-vous','Maquette','Proposition','Relances','Négociation','Signé','Onboarding','Construction','Validation','Livraison','Formation','Maintenance','Upsell','Renouvellement'];

  let data = [];
  let editId = null;

  async function load() {
    try {
      data = await fetch(API+'/prospects').then(r=>r.json());
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('crmTable').style.display = 'table';
      render();
    } catch(e) {
      document.getElementById('loadingMsg').textContent = 'Erreur de connexion au serveur. Lance node server.js.';
    }
  }

  function render() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);padding:24px;font-size:12px">Aucun prospect. Clique sur + pour commencer.</td></tr>'; return; }
    data.forEach(p => {
      const etapeLabel = ETAPES[p.etape] || '—';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${p.nom}</strong></td>
        <td>${p.entreprise||'—'}</td>
        <td><span class="badge s${p.etape}">${etapeLabel}</span></td>
        <td style="color:var(--muted);font-size:12px">${p.tel||'—'}</td>
        <td style="color:var(--muted);font-size:12px;max-width:200px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${p.notes||'—'}</td>
        <td>
          <span class="action-link" onclick="openDrawer(${p.id})">Modifier</span>
          <span class="action-link" style="color:var(--muted)" onclick="del(${p.id})">Suppr.</span>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function openDrawer(id) {
    editId = id || null;
    if (id) {
      const p = data.find(x=>x.id===id);
      document.getElementById('drawerTitle').textContent = p.nom;
      document.getElementById('fNom').value = p.nom;
      document.getElementById('fEntreprise').value = p.entreprise||'';
      document.getElementById('fTel').value = p.tel||'';
      document.getElementById('fEmail').value = p.email||'';
      document.getElementById('fEtape').value = p.etape;
      document.getElementById('fNotes').value = p.notes||'';
    } else {
      document.getElementById('drawerTitle').textContent = 'Nouveau prospect';
      ['fNom','fEntreprise','fTel','fEmail','fNotes'].forEach(i=>document.getElementById(i).value='');
      document.getElementById('fEtape').value = 0;
    }
    document.getElementById('drawer').classList.add('open');
  }

  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }

  async function saveProspect() {
    const body = {
      nom: document.getElementById('fNom').value.trim(),
      entreprise: document.getElementById('fEntreprise').value.trim(),
      tel: document.getElementById('fTel').value.trim(),
      email: document.getElementById('fEmail').value.trim(),
      etape: parseInt(document.getElementById('fEtape').value),
      notes: document.getElementById('fNotes').value.trim()
    };
    if (!body.nom) return;
    if (editId) await fetch(API+'/prospects/'+editId, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    else await fetch(API+'/prospects', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    closeDrawer();
    load();
  }

  async function del(id) {
    if (!confirm('Supprimer ?')) return;
    await fetch(API+'/prospects/'+id, {method:'DELETE'});
    load();
  }

  load();
</script>
</body>
</html>
